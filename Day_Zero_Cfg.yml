---
- name: Build and Deploy Fortigates
  hosts: localhost
  connection: local
  collections:
    - fortinet.fortiflexvm
  vars_files:
    - vars.yml
  gather_facts: false
  tasks:
  ## The following plays just deploy the VM.
    - name: Check if VM already exists
      ansible.builtin.command: virsh dominfo "{{ VM_NAME }}"
      register: vm_check
      failed_when: false      # don't fail the task when virsh returns non-zero
      changed_when: false     # this is a read-only check, never "changed" 
    - name: Copy image to libvirt directory
      ansible.builtin.copy:
        src: "{{ IMAGE_SRC }}"
        dest: "{{ IMAGE_DST_DIR }}fortios.qcow2"
        mode: "0644"
        force: no
      become: yes
      register: copy_results
      when: vm_check.rc != 0   # only run if dominfo didn't find the VM
    - name: Display Copy copy_results
      ansible.builtin.debug:
        var: copy_results
    - name: Create and start VM using virt-install
      ansible.builtin.command: >
        virt-install
        --name "{{ VM_NAME }}"
        --memory 2048
        --vcpus 1
        --disk "{{ IMAGE_DST_DIR }}fortios.qcow2",format=qcow2,bus=virtio
        --disk path="{{ IMAGE_DST_DIR }}fortigate_LogDisk.raw",size=32,bus=virtio
        --import
        --os-variant rhel7-unknown
        --graphics none
        --network bridge=br0,model=virtio
        --network bridge=FGT_LAN,model=virtio
        --network bridge=HA_Sync,model=virtio
        --network bridge=FGT_MGMT,model=virtio
        --console pty,target_type=serial,log.file=/var/log/libvirt/qemu/{{ VM_NAME }}-serial.log
        --noautoconsole
      when: vm_check.rc != 0   # only run if dominfo didn't find the VM
## This is the start of where I understand the other playbook ends.
#####################################################################
    - name: Get config group nexttoken
      fortinet.fortiflexvm.fortiflexvm_groups_nexttoken_info:
        # username and password is the API user and secret from IAM user in FortiCloud
        username: "{{ username }}"
        password: "{{ password }}"
        # Please declare at least one of the following two arguments: accountId or configId.
        # You can comment at most one argument that you don't want to specify. if you use both,
        # the config is more specific and will future proof our deployment.
        # My Id is 9483 which I got from running the command without the ID and getting it from the output
        configId: 9483 
        accountId: "{{ accountId }}"
        folderPath: "My Assets"
        status: ["ACTIVE", "PENDING"] # "ACTIVE", "PENDING", "STOPPED", "EXPIRED"
      register: fortiflex_result 
    - name: Display response
      ansible.builtin.debug:
        var: fortiflex_result.entitlements

# The following consoles into the newly provisioned fortigate VM on the host
# and adds configurations for the management interface, as well as a default route out
# which is then used to license the box via FortiFlex cloud

    - name: Connect to virsh console and execute commands
      ansible.builtin.expect:
        command: "virsh --connect qemu:///system console {{ VM_NAME }} --force"
        timeout: 360
        echo: yes
        responses:
          "Escape character is": "\r"
          "FortiGate-VM64-KVM login:": "admin" 
          "Password:": "\r"
          "New Password:": "{{ FORTIGATE_ADMIN_PASS }}"
          "Confirm Password:": "{{ FORTIGATE_ADMIN_PASS }}"    
          "#": 
            - "config system interface"
            - "edit port1"
            - "set mode static"
            - "set ip {{ MGMT_VIP }} {{ MGMT_VIP_SUBNET }}"
            - "set alias MGMT"
            - "set allowaccess ping https ssh snmp fgfm radius-acct"
            - "set dedicated-to management"
            - "set management-ip {{ MGMT_VIP }} {{ MGMT_VIP_SUBNET }}"
            - "set trust-ip-1 {{ trust_IP }}"
            - "next"
            - "end"
            - "config router static"
            - "edit 0"
            - "set gateway {{ MGMT_GW }}"
            - "set device port1"
            - "next"
            - "end"
            - "config system accprofile"
            - "edit APIadmin"
            - "set secfabgrp read-write"
            - "set ftviewgrp read-write"
            - "set authgrp read-write"
            - "set sysgrp custom"
            - "set netgrp read-write"
            - "set loggrp read-write"
            - "set fwgrp read-write"
            - "set vpngrp read-write"
            - "set utmgrp read-write"
            - "set cli-diagnose enable"
            - "set cli-get enable"
            - "set cli-show enable"
            - "set cli-exec enable"
            - "set cli-config enable"
            - "config sysgrp-permission"
            - "set upd read-write"
            - "set cfg read-write"
            - "set mnt read-write"
            - "end"
            - "next "
            - "end"
            - "config system api-user"
            - "edit temp_user"
            - "set comments \"temp api access for initial config push via api, should not be here if everything worked correctly\""
            - "set accprofile super_admin"
            - "config trusthost"
            - "edit 1"
            - "set ipv4-trusthost {{ trust_IP }}"
            - "next"
            - "end"
            - "next"
            - "end"
            - "exe api-user generate-key temp_user"
            - "exe vm-license-options count 10"
            - "exe vm-license-options interval 5"
            - "exe vm-license {{ fortiflex_result.entitlements[0].token }}\ry\r"
            - "\r"
            - "\r"
          "Please enter current administrator password:": "{{ FORTIGATE_ADMIN_PASS }}"
          "Requesting FortiCare license token:": "\r"
          "VM license install succeeded. Rebooting firewall.": "\x1d"
      become: yes
      register: console_output
    - name: Print Console Output
      ansible.builtin.debug:
        var: console_output.stdout_lines
    - name: extract API key
      ansible.builtin.set_fact:
        temp_api_key: "{{ console_output.stdout | regex_search('New API key:\\s*(\\S+)', '\\1') | first }}"

    - name: Fail if API key wasn't captured
      ansible.builtin.fail:
        msg: "Could not extract API key from console output — inspect /var/log/libvirt/qemu/{{ VM_NAME }}-serial.log"
      when: temp_api_key | length == 0

## will reboot the box after the restore. This is like a restore from backup 
- name: Configure Day Zero on Fortigates
  hosts: FortiGate
  connection: httpapi
  collections:
    - fortinet.fortios
  vars:
    ansible_httpapi_session_key: 
      access_token: "{{ hostvars['localhost'].temp_api_key }}"
  vars_files:
    - vars.yml
  gather_facts: false
  tasks:
    - name: wait for Fortigate API to be ready
      ansible.builtin.uri:
        url: "https://{{ MGMT_VIP }}/api/v2/monitor/system/status"
        headers:
          Authorization: "Bearer {{ hostvars['localhost'].temp_api_key }}"
        validate_certs: false
        status_code: 200
      register: result
      until: result.status == 200
      retries: 60
      delay: 5
      delegate_to: localhost
    - name: Read and encode script file
      ansible.builtin.set_fact:
        encoded_fortigate_config: "{{ lookup('ansible.builtin.file', './restore.conf') | b64encode }}"
    # - name: Display response
    #   ansible.builtin.debug:
    #     var: encoded_fortigate_config
    - name: Reset httpapi connection before restore
      ansible.builtin.meta: reset_connection
    - name: restore Fortinet Config from file
      fortinet.fortios.fortios_monitor:
        vdom: "root"
        selector: 'restore.system.config'
        params:
          source: "upload"
          scope: "global"
          file_content: "{{ encoded_fortigate_config }}"
      

# Will not reset the box and allows for config changes with FGT script 
- name: Configure Day two items on Fortigates
  hosts: FortiGate
  connection: httpapi
  collections:
    - fortinet.fortios
  vars:
    ansible_httpapi_session_key: 
      access_token: "{{ TEST_FGT_API_KEY }}"
  vars_files:
    - vars.yml
  gather_facts: false
  tasks:
    - name: wait for Fortigate API to be ready
      ansible.builtin.uri:
        url: "https://{{ MGMT_VIP }}/api/v2/monitor/system/status"
        headers:
          Authorization: "Bearer {{ TEST_FGT_API_KEY }}"
        validate_certs: false
        status_code: 200
      register: result
      until: result.status == 200
      retries: 60
      delay: 5
      delegate_to: localhost
    - name: Read and encode script file
      ansible.builtin.set_fact:
        encoded_fortigate_script: "{{ lookup('ansible.builtin.file', './fortigate.conf') | b64encode }}"
    # - name: Display response
    #   ansible.builtin.debug:
    #     var: encoded_fortigate_script
    - name: Run Fortinet Config script from file
      fortinet.fortios.fortios_monitor:
        vdom: "root"
        selector: 'upload.system.config-script'
        params:
          filename: "Changes made Day2" ## name as it will appear on the fortigate
          file_content: "{{ encoded_fortigate_script }}"
      

